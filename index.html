<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Monedas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center text-white">Formulario de Monedas</h2>
        <form id="form1">
            <div class="mb-3">
                <label for="monedaEnvio" class="form-label text-white">Tipo de moneda a enviar</label>
                <select id="monedaEnvio" class="form-select" required>
                    <option value="soles">Soles</option>
                    <option value="dolares">Dólares</option>
                    <option value="reales">Reales Brasileños</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="monedaRecibo" class="form-label text-white">Tipo de moneda a recibir</label>
                <select id="monedaRecibo" class="form-select" required>
                    <option value="soles">Soles</option>
                    <option value="dolares">Dólares</option>
                    <option value="reales">Reales Brasileños</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="paisOrigen" class="form-label text-white">País de origen</label>
                <select id="paisOrigen" class="form-select" required>
                    <option value="Perú">Perú</option>
                    <option value="Brasil">Brasil</option>
                    <option value="EEUU">Estados Unidos</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="paisDestino" class="form-label text-white">País de destino</label>
                <select id="paisDestino" class="form-select" required>
                    <option value="Perú">Perú</option>
                    <option value="Brasil">Brasil</option>
                    <option value="EEUU">Estados Unidos</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="monto" class="form-label text-white">Monto en soles</label>
                <input type="number" id="monto" class="form-control" required>
            </div>
            <button type="button" class="btn btn-success" onclick="convertir()">Convertir</button>
            <button type="submit" class="btn btn-primary">Siguiente</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
