<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Datos Personales</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center text-white">Datos Personales</h2>
        <form id="form2">
            <div class="mb-3">
                <label for="nombre" class="form-label text-white">Nombre</label>
                <input type="text" id="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="segundoNombre" class="form-label text-white">Segundo Nombre (Opcional)</label>
                <input type="text" id="segundoNombre" class="form-control">
            </div>
            <div class="mb-3">
                <label for="apellido" class="form-label text-white">Apellido</label>
                <input type="text" id="apellido" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="segundoApellido" class="form-label text-white">Segundo Apellido</label>
                <input type="text" id="segundoApellido" class="form-control">
            </div>
            <div class="mb-3">
                <label for="dni" class="form-label text-white">DNI</label>
                <input type="text" id="dni" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="fechaActual" class="form-label text-white">Fecha Actual (YY-MM-DD)</label>
                <input type="date" id="fechaActual" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
